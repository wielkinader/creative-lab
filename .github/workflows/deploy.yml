name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build the shape-painter Vite app.
      - name: Build shape-painter
        working-directory: projects/shape-painter
        run: |
          npm ci
          npm run build

      # Assemble the published site: landing page at root, built apps under projects/.
      - name: Assemble site
        run: |
          mkdir -p _site/projects/shape-painter
          cp index.html _site/index.html
          cp -r projects/shape-painter/dist/. _site/projects/shape-painter/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
